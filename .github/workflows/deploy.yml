name: Deploy to NAS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy locally on NAS
        run: |
          echo "🚀 Deploying on NAS..."
          echo "Runner workspace: $GITHUB_WORKSPACE"
          echo "Current dir: $(pwd)"
          find / -name ".env.prod" 2>/dev/null | head -20
          find / -name "docker-compose.prod.yml" 2>/dev/null | head -20

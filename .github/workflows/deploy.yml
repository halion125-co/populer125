name: Deploy to NAS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy locally on NAS
        run: |
          echo "🚀 Deploying on NAS..."
          cp /volume2/docker/populer125/.env.prod .env.prod
          docker-compose -f docker-compose.prod.yml up -d --build
